name: GitHub Action
run-name: ${{ github.actor }} is building the repository 🚀
on: [push]
jobs:
  Build-Linux:
    runs-on: ubuntu-latest
    steps:
      - run: echo "🔎 Building Linux version on branch ${{ github.ref }}"
      
      - name: Check out repository code
        uses: actions/checkout@v4
      
      - name: Install dependencies
        run: |
          sudo apt-get update
          sudo apt-get install -y \
            build-essential \
            cmake \
            libraylib-dev \
            python3 \
            python3-pip \
            python3-venv

      - name: Create virtual environment and install cpplint
        run: |
          python3 -m venv ${{ github.workspace }}/venv
          source ${{ github.workspace }}/venv/bin/activate
          pip install --no-cache-dir cpplint

      - name: Run cpplint
        run: |
          source ${{ github.workspace }}/venv/bin/activate
          cpplint \
            --filter=-build/c++11,-runtime/references,-build/header_guard,-build/c++17 \
            --exclude=src/udjourney/include/udjourney/dreamcast_json_compat.h \
            --recursive src/

      - name: Build Linux version
        run: |
          echo "🔨 Building Linux version..."
          mkdir build
          cd build
          cmake ..
          make -j$(nproc)
          echo "✅ Linux build completed"

  Build-Dreamcast:
    runs-on: ubuntu-latest
    container: 
      image: maishuji/dc-kos-image:14.3.0-28sep25-kp29sep25
      options: --user root
    steps:
      - run: echo "🔎 Building Dreamcast version on branch ${{ github.ref }}"
      
      - name: Check out repository code
        uses: actions/checkout@v4
      - run: echo "💡 The ${{ github.repository }} repository has been cloned to the runner."

      - name: Build Dreamcast version
        run:  |
          echo "🔨 Building Dreamcast version..."
          source /opt/toolchains/dc/kos/environ.sh
          mkdir build
          cd build
          cmake .. -DCMAKE_TOOLCHAIN_FILE=../toolchains/dreamcast.cmake
          make
          echo "✅ Dreamcast build completed"
        shell: bash
